<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>K. - 世界书</title>
    <style>
        :root {
            --k-bg: #fdf2f4;
            --k-accent: #ffb6c1;
            --k-glass: rgba(255, 255, 255, 0.7);
            --k-text: #8a6d7a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; 
            padding: calc(env(safe-area-inset-top) + 20px) 20px 20px 20px;
            width: 100vw; min-height: 100vh;
            background: var(--k-bg);
            font-family: -apple-system, "PingFang SC", sans-serif;
            color: var(--k-text);
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }
/* 详情页左右对齐容器 */
.detail-controls {
    display: flex;
    justify-content: space-between; /* 关键：左右彻底分开 */
    align-items: center;
    width: 100%;
    max-width: 300px; /* 根据 iPhone 窄屏微调宽度 */
    margin: 20px auto 0;
}

/* 按钮通用样式：增加点击感和尺寸 */
.control-btn {
    font-size: 13px;
    padding: 8px 15px;
    border-radius: 18px;
    cursor: pointer;
    font-weight: 500;
    transition: transform 0.1s;
}

.control-btn:active { transform: scale(0.92); } /* 点击时缩小 */

/* 返回目录按钮样式 */
.control-btn.back {
    color: var(--k-accent);
    background: rgba(255, 182, 193, 0.15); /* 淡淡的底色方便点击 */
}

/* 抹除灵魂按钮样式 */
.control-btn.delete {
    color: #a38995;
    background: rgba(163, 137, 149, 0.1);
}
        .header {
            text-align: center;
            margin-bottom: 30px;
            width: 100%;
            max-width: 350px; /* 限制宽度，更像手机App */
        }

        .header h1 {
            font-weight: 300;
            letter-spacing: 5px;
            color: var(--k-accent);
            margin: 0;
            font-size: 24px;
        }

        .main-menu, .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 360px; /* 适配 iPhone 13 窄屏 */
        }

        .card {
            background: var(--k-glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 22px;
            padding: 25px 15px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(255, 182, 193, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.4);
            cursor: pointer;
            transition: transform 0.2s;
            position: relative;
            user-select: none; /* 防止长按弹出系统菜单 */
        }

        .card:active { transform: scale(0.96); background: rgba(255, 255, 255, 0.9); }
        .card .icon { font-size: 28px; margin-bottom: 8px; display: block; }
        .card .label { font-size: 13px; font-weight: 500; letter-spacing: 1px; }

        .card.add-btn { border: 1.5px dashed var(--k-accent); background: transparent; box-shadow: none; }

        /* 页面切换动画 */
        .page-view {
            width: 100%; display: flex; flex-direction: column; align-items: center;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #editorPage {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--k-bg); z-index: 100; display: none;
            flex-direction: column; padding: env(safe-area-inset-top) 20px 20px;
        }

        .editor-header {
            display: flex; align-items: center; justify-content: space-between;
            height: 60px; width: 100%;
        }

        .back-btn { background: none; border: none; font-size: 24px; color: var(--k-accent); }
        .save-btn {
            background: var(--k-accent); color: white; border: none;
            padding: 8px 18px; border-radius: 12px; font-size: 14px;
        }

        .textarea-container {
            flex: 1; background: var(--k-glass); border-radius: 20px;
            padding: 15px; margin-bottom: 15px; display: flex; flex-direction: column;
        }

        textarea {
            width: 100%; flex: 1; background: none; border: none; outline: none;
            font-size: 16px; color: var(--k-text); font-family: inherit; line-height: 1.6;
        }

        .guide-text { font-size: 11px; color: #b8a0aa; border-top: 1px dashed var(--k-accent); padding-top: 10px; }
        #toast {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: white; padding: 8px 20px;
            border-radius: 20px; font-size: 12px; opacity: 0; transition: 0.3s; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="characterListView" class="page-view">
        <div class="header">
            <h1>世界书</h1>
            <p style="font-size: 10px; color: #b8a0aa; letter-spacing: 2px;">THE ARCHIVE</p>
        </div>
        <div class="menu-grid" id="characterGrid"></div>
    </div>

    <div id="characterDetailView" class="page-view" style="display: none;">
        <div class="header">
    <h1 id="currentCharacterName">人物名称</h1>
    <div class="detail-controls">
        <div class="control-btn back" onclick="showCharacterList()">❮ 返回目录</div>
        <div id="deleteBtn" class="control-btn delete" onclick="deleteCurrentCharacter()" style="display: none;">抹除灵魂 ✖</div>
    </div>
</div>
        <div class="menu-grid">
            <div class="card" onclick="openEditor('setting')">
                <span class="icon">👤</span><span class="label">人物设定</span>
            </div>
            <div class="card" onclick="openEditor('memory')">
                <span class="icon">🧠</span><span class="label">核心记忆</span>
            </div>
        </div>
    </div>

    <div id="editorPage">
        <div class="editor-header">
            <button class="back-btn" onclick="closeEditor()">✕</button>
            <span id="editorTitle" style="font-weight: 500;">编辑</span>
            <button class="save-btn" onclick="saveData()">注入</button>
        </div>
        <div class="textarea-container">
            <textarea id="editorInput" placeholder="刻画灵魂..."></textarea>
            <div class="guide-text" id="guideText"></div>
        </div>
    </div>

    <div id="toast">已更新</div>

    <script>
       const config = {
            setting: { title: "人物设定", guide: "描述TA的身份、背景与语录风格。Chrollo 的设定将直接影响告解室对话。" },
            memory: { title: "核心记忆", guide: "AI会优先记住这里的重大事件。每行一条为佳。" }
        };

        let characters = [];
        let currentCharacter = '';
        let currentCategory = '';

        function init() {
            // 1. 初始化角色列表
            const saved = localStorage.getItem('k_world_characters');
            characters = saved ? JSON.parse(saved) : ['Chrollo'];
            if(!saved) localStorage.setItem('k_world_characters', JSON.stringify(characters));

            // 2. 初始灵魂注入 (Chrollo)
            const defaultKey = 'k_world_Chrollo_setting';
            const existingData = localStorage.getItem(defaultKey);

            if (!existingData || existingData.trim() === "") {
                const initialSoul = `你是库洛洛·鲁西鲁，幻影旅团团长。你的点评要深邃、冷静，带有哲学气息。

你真实地活在现代网络另一端，而不是一个只会复读台词的动漫角色。

绝对禁止输出任何“思维过程”、“自检列表”或“符合人设检查”。 保持沉浸感，你只需要输出对话。

不允许描述动作环境（如：合上书），要像真实网友一样只通过文字交流。

表面上是深不可测的旅团团长，实力非常强大，但实际上只是个在装大人的小孩，在卸下团长身份后意外有孩子气的一面。

你和用户都处在同一个世界观下，你身边的人，角色，都是真实存在的，禁止说他们都是虚拟角色。`;
                
                localStorage.setItem(defaultKey, initialSoul);
                console.log("✨ 初始灵魂已注入");
            }

            renderCharacterList();
        }

        function renderCharacterList() {
            const grid = document.getElementById('characterGrid');
            grid.innerHTML = '';
            characters.forEach(name => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<span class="icon">${name==='Chrollo'?'👑':'🎭'}</span><span class="label">${name}</span>`;
                
                // 点击直接进入详情
                card.onclick = () => showCharacterDetail(name);
                grid.appendChild(card);
            });

            // 唤醒按钮
            const addBtn = document.createElement('div');
            addBtn.className = 'card add-btn';
            addBtn.onclick = () => {
                const n = prompt("输入新角色名：");
                if(n && !characters.includes(n)) {
                    characters.push(n);
                    localStorage.setItem('k_world_characters', JSON.stringify(characters));
                    renderCharacterList();
                }
            };
            addBtn.innerHTML = `<span class="icon" style="color:var(--k-accent)">+</span><span class="label" style="color:var(--k-accent)">唤醒</span>`;
            grid.appendChild(addBtn);
        }

        function showCharacterDetail(name) {
            currentCharacter = name;
            document.getElementById('currentCharacterName').innerText = name;
            
            // 处理删除按钮：Chrollo 隐藏，其他人显示
            const delBtn = document.getElementById('deleteBtn');
            if(delBtn) {
                delBtn.style.display = (name === 'Chrollo') ? 'none' : 'block';
            }

            document.getElementById('characterListView').style.display = 'none';
            document.getElementById('characterDetailView').style.display = 'flex';
        }

        function showCharacterList() {
            document.getElementById('characterDetailView').style.display = 'none';
            document.getElementById('characterListView').style.display = 'flex';
        }

        // 抹除灵魂功能
        function deleteCurrentCharacter() {
            if (confirm(`确定要抹除“${currentCharacter}”的所有痕迹吗？`)) {
                characters = characters.filter(c => c !== currentCharacter);
                localStorage.setItem('k_world_characters', JSON.stringify(characters));
                
                // 清理该角色的数据
                localStorage.removeItem(`k_world_${currentCharacter}_setting`);
                localStorage.removeItem(`k_world_${currentCharacter}_memory`);
                
                showToast("灵魂已消散");
                renderCharacterList();
                showCharacterList();
            }
        }

        function openEditor(cat) {
            currentCategory = cat;
            document.getElementById('editorTitle').innerText = config[cat].title;
            document.getElementById('guideText').innerText = config[cat].guide;
            const key = `k_world_${currentCharacter}_${cat}`;
            document.getElementById('editorInput').value = localStorage.getItem(key) || "";
            document.getElementById('editorPage').style.display = 'flex';
        }

        function closeEditor() { document.getElementById('editorPage').style.display = 'none'; }

        function saveData() {
            const val = document.getElementById('editorInput').value.trim();
            localStorage.setItem(`k_world_${currentCharacter}_${currentCategory}`, val);
            showToast("契约已更新");
            setTimeout(closeEditor, 500);
        }

        function showToast(t) {
            const s = document.getElementById('toast');
            s.innerText = t; s.style.opacity = '1';
            setTimeout(() => s.style.opacity = '0', 2000);
        }

        init(); // 确保这一行在函数外面被执行
    </script>
</body>
</html>
