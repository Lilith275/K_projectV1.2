<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>系统美化控制台</title>
    <style>
        :root {
            --k-pink-light: #fef6f8;
            --k-pink-accent: #ffb6c1;
            --k-purple-accent: #b19cd9;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --text-main: #555;
            --text-sub: #999;
        }

        body {
            margin: 0;
            padding: 20px;
            background: var(--k-pink-light);
            font-family: -apple-system, "SF Pro Display", "PingFang SC", sans-serif;
            color: var(--text-main);
            /* 防止底部按钮遮挡内容 */
            padding-bottom: 120px;
            background-image: radial-gradient(circle at 10% 20%, rgba(255, 182, 193, 0.1) 0%, rgba(255, 255, 255, 0) 40%);
        }

        /* 顶部标题区 */
        .header {
            text-align: center;
            margin: 20px 0 30px;
        }

        .header h2 {
            font-size: 22px;
            font-weight: 300;
            letter-spacing: 4px;
            color: var(--k-purple-accent);
            margin: 0;
        }

        .header p {
            font-size: 11px;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        /* 玻璃质感卡片 */
        .setting-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(255, 182, 193, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--k-purple-accent);
        }

        /* 控制组布局 */
        .control-group {
            margin-bottom: 20px;
        }

        .control-group:last-child { margin-bottom: 0; }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        label {
            font-size: 13px;
            color: var(--text-main);
            font-weight: 500;
        }

        .val-badge {
            font-size: 11px;
            background: rgba(177, 156, 217, 0.1);
            color: var(--k-purple-accent);
            padding: 2px 8px;
            border-radius: 10px;
        }

        /* 自定义滑块 */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(0,0,0,0.05);
            border-radius: 2px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: white;
            border: 2px solid var(--k-pink-accent);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(255, 182, 193, 0.4);
        }

        /* 自定义颜色选择器容器 */
        .color-picker-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        input[type="color"] {
            -webkit-appearance: none;
            width: 40px;
            height: 25px;
            border: none;
            border-radius: 6px;
            background: none;
            cursor: pointer;
        }

        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch {
            border: 2px solid white;
            border-radius: 6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* 文件上传美化 */
        .file-input-wrapper {
            position: relative;
            background: rgba(255,255,255,0.4);
            border: 1px dashed var(--k-pink-accent);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            transition: 0.3s;
        }

        .file-input-wrapper:active { background: rgba(255, 182, 193, 0.1); }

        input[type="file"] {
            font-size: 12px;
            color: var(--text-sub);
            width: 100%;
        }

        /* 底部固定的保存按钮 */
        .footer-action {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            background: linear-gradient(to top, var(--k-pink-light) 60%, transparent);
            z-index: 100;
        }

        .save-btn {
            width: 100%;
            background: var(--k-pink-accent);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 2px;
            box-shadow: 0 10px 20px rgba(255, 182, 193, 0.4);
            cursor: pointer;
            transition: 0.3s;
        }

        .save-btn:active { transform: scale(0.96); opacity: 0.9; }

    </style>
</head>
<body>

    <div class="header">
        <h2>主页布局</h2>
        <p>System Aesthetic Console</p>
    </div>

    <div class="setting-card">
        <div class="section-title">🖼️ 壁纸上传</div>
        <div class="control-group">
            <label>更换锁屏背景</label>
            <div class="file-input-wrapper" style="margin-top:8px;">
                <input type="file" id="lockUpload" accept="image/*">
            </div>
        </div>
        <div class="control-group">
            <label>更换桌面背景</label>
            <div class="file-input-wrapper" style="margin-top:8px;">
                <input type="file" id="deskUpload" accept="image/*">
            </div>
        </div>
    </div>

    <div class="setting-card">
        <div class="section-title">✍️ 锁屏时间美化</div>
        <div class="control-group">
            <div class="label-row">
                <label>时间颜色</label>
            </div>
            <div class="color-picker-wrapper">
                <input type="color" id="timeColor" value="#ffffff">
                <span style="font-size: 12px; color: #999;">点击色块选择颜色</span>
            </div>
        </div>
        <div class="control-group">
            <div class="label-row">
                <label>字体大小</label>
                <span class="val-badge"><span id="sizeVal">88</span>px</span>
            </div>
            <input type="range" id="timeSize" min="40" max="150" value="88">
        </div>
        <div class="control-group">
            <div class="label-row">
                <label>透明度</label>
                <span class="val-badge"><span id="alphaVal">1.0</span></span>
            </div>
            <input type="range" id="timeAlpha" min="0" max="1" step="0.1" value="1">
        </div>
        <div class="control-group">
            <div class="label-row">
                <label>字间距</label>
                <span class="val-badge"><span id="spaceVal">-2</span>px</span>
            </div>
            <input type="range" id="timeSpace" min="-15" max="30" value="-2">
        </div>
    </div>

    <div class="setting-card">
        <div class="section-title">📱 桌面显示</div>
        <div class="control-group">
            <div class="label-row">
                <label>图标文字颜色</label>
            </div>
            <div class="color-picker-wrapper">
                <input type="color" id="deskLabelColor" value="#ffffff">
                <span style="font-size: 12px; color: #999;">应用于 App 名称</span>
            </div>
        </div>
    </div>

    <div class="footer-action">
        <button class="save-btn" onclick="saveAll()">保存并应用设置</button>
    </div>

   <script>
    // 核心函数：实时同步样式到主界面
    function syncStyle() {
        // 1. 获取控制台当前选中的数值
        const config = {
            color: document.getElementById('timeColor').value,
            size: document.getElementById('timeSize').value + 'px',
            space: document.getElementById('timeSpace').value + 'px',
            alpha: document.getElementById('timeAlpha').value,
            deskColor: document.getElementById('deskLabelColor').value
        };

        // 2. 获取主页面的 document 对象
        const mainDoc = window.parent.document;

        // --- 开始同步 ---

        // A. 同步锁屏时间样式 (主页 ID: #lock-time)
        const lockTime = mainDoc.getElementById('lock-time');
        if (lockTime) {
            lockTime.style.cssText += `
                color: ${config.color} !important;
                font-size: ${config.size} !important;
                letter-spacing: ${config.space} !important;
                opacity: ${config.alpha} !important;
            `;
        }

        // B. 同步桌面图标文字颜色 (主页 Class: .app-label)
        const labels = mainDoc.querySelectorAll('.app-label');
        labels.forEach(label => {
            label.style.setProperty('color', config.deskColor, 'important');
        });
    }

    // 绑定所有滑块和颜色选择器的实时监听
    const ids = ['timeColor', 'timeSize', 'timeSpace', 'timeAlpha', 'deskLabelColor'];
    ids.forEach(id => {
        const input = document.getElementById(id);
        if (input) {
            input.oninput = () => {
                // 更新控制台自己的数字显示
                const badgeId = id.replace('time', '').toLowerCase() + 'Val';
                const badge = document.getElementById(badgeId);
                if (badge) badge.innerText = input.value;

                // 立即执行同步
                syncStyle();
            };
        }
    });

    // 处理背景上传预览 (Base64 实时注入)
    async function fileToBase64(file) {
        return new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(file); });
    }

    // 保存按钮逻辑
    async function saveAll() {
    const btn = document.querySelector('.save-btn');
    btn.innerText = "⚡ 同步中...";

    const config = {
        color: document.getElementById('timeColor').value,
        size: document.getElementById('timeSize').value + 'px',
        space: document.getElementById('timeSpace').value + 'px',
        alpha: document.getElementById('timeAlpha').value,
        deskColor: document.getElementById('deskLabelColor').value
    };

    // 存储文字配置
    localStorage.setItem('k_font_config', JSON.stringify(config));

    // 处理并存储锁屏壁纸
    const lockFile = document.getElementById('lockUpload').files[0];
    if (lockFile) {
        const reader = new FileReader();
        reader.onload = (e) => localStorage.setItem('k_lock_bg', e.target.result);
        reader.readAsDataURL(lockFile);
    }

    // 处理并存储桌面壁纸
    const deskFile = document.getElementById('deskUpload').files[0];
    if (deskFile) {
        const reader = new FileReader();
        reader.onload = (e) => localStorage.setItem('k_desk_bg', e.target.result);
        reader.readAsDataURL(deskFile);
    }

    btn.innerText = "✨ 已保存";
    setTimeout(() => btn.innerText = "保存并应用设置", 1500);
}
</script>
</body>
</html>
