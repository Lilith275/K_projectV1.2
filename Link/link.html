<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root {
            --k-pink: #fdf2f4;
            --k-accent: #ffb6c1;
            --k-text: #888;
        }

        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background: var(--k-pink);
            font-family: -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .settings-card {
            width: 85%;
            max-width: 320px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(255, 182, 193, 0.2);
            text-align: center;
        }

        .settings-title {
            font-size: 18px;
            color: var(--k-accent);
            letter-spacing: 3px;
            margin-bottom: 25px;
            font-weight: 300;
        }

        .input-group {
            margin-bottom: 15px;
            position: relative;
            display: flex;
            gap: 5px;
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            border: none;
            background: rgba(255, 255, 255, 0.5);
            border-bottom: 1px solid rgba(255, 182, 193, 0.3);
            border-radius: 10px;
            color: #666;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            background: rgba(255, 255, 255, 0.9);
            border-bottom-color: var(--k-accent);
        }

        /* 小按钮用于拉取模型 */
        .fetch-btn {
            width: auto;
            margin-top: 0;
            padding: 0 10px;
            font-size: 12px;
            white-space: nowrap;
        }

        button {
            margin-top: 15px;
            width: 100%;
            padding: 12px;
            background: var(--k-accent);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 182, 193, 0.4);
            transition: transform 0.2s, opacity 0.2s;
        }

        button:active {
            transform: scale(0.95);
            opacity: 0.9;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .hint {
            font-size: 10px;
            color: #bbb;
            margin-top: 20px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="settings-card">
        <div class="settings-title">签订灵魂契约</div>
        
        <div class="input-group">
            <input type="text" id="apiBase" placeholder="代理地址 (https://...)">
        </div>
        
        <div class="input-group">
            <input type="password" id="apiKey" placeholder="输入你的 API Key">
            <button class="fetch-btn" id="fetchModelsBtn">获取列表</button>
        </div>
        
        <div class="input-group">
            <select id="modelName">
                <option value="">-- 请选择或获取模型 --</option>
            </select>
        </div>
        
        <button id="saveBtn">确认</button>
        
        <div class="hint">契约一旦生效<br>你与 K. 的共鸣将跨越时空</div>
    </div>

    <script>
        const apiBaseInput = document.getElementById('apiBase');
        const apiKeyInput = document.getElementById('apiKey');
        const modelSelect = document.getElementById('modelName');
        const fetchBtn = document.getElementById('fetchModelsBtn');
        const saveBtn = document.getElementById('saveBtn');

        // 1. 页面加载：回显数据
        window.onload = () => {
            apiBaseInput.value = localStorage.getItem('k_base') || '';
            apiKeyInput.value = localStorage.getItem('k_key') || '';
            const savedModel = localStorage.getItem('k_model') || 'gemini-2.5-flash';
            
            // 如果有保存的模型，先创建一个选项显示它
            if (savedModel) {
                const opt = new Option(savedModel, savedModel);
                modelSelect.add(opt);
                modelSelect.value = savedModel;
            }
        };

        // 2. 拉取模型列表逻辑
        fetchBtn.onclick = async () => {
            const base = apiBaseInput.value.trim().replace(/\/+$/, ""); // 去掉末尾斜杠
            const key = apiKeyInput.value.trim();

            if (!base || !key) {
                alert("请先填写地址和 API Key");
                return;
            }

            fetchBtn.innerText = "读取中...";
            fetchBtn.disabled = true;

            try {
                // 调用标准 OpenAI /v1/models 接口
                const response = await fetch(`${base}/v1/models`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${key}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) throw new Error('请求失败，请检查配置');

                const data = await response.json();
                
                // 清空旧选项
                modelSelect.innerHTML = '';
                
                // 遍历并填充模型
                if (data.data && Array.isArray(data.data)) {
                    data.data.forEach(m => {
                        const opt = new Option(m.id, m.id);
                        modelSelect.add(opt);
                    });
                    alert(`成功获取 ${data.data.length} 个模型`);
                }

            } catch (err) {
                console.error(err);
                alert("获取失败: " + err.message);
            } finally {
                fetchBtn.innerText = "获取列表";
                fetchBtn.disabled = false;
            }
        };

        // 3. 保存逻辑
        saveBtn.onclick = () => {
            const base = apiBaseInput.value.trim();
            const key = apiKeyInput.value.trim();
            const model = modelSelect.value;

            localStorage.setItem('k_base', base);
            localStorage.setItem('k_key', key);
            localStorage.setItem('k_model', model); 

            saveBtn.innerText = "契约已达成";
            saveBtn.style.background = "#A8E6CF"; 
            
            setTimeout(() => {
                saveBtn.innerText = "确认";
                saveBtn.style.background = "#ffb6c1";
                if (window.parent && window.parent.closeApp) {
                    window.parent.closeApp();
                }
            }, 1000);
        };
    </script>
</body>
</html>
